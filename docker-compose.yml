version: '3.8'

services:
  postgres:
    image: postgres:14
    environment:
      POSTGRES_DB: app_development
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend-dev
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/app_development
      REDIS_URL: redis://redis:6379/1
      RAILS_ENV: development
      CORS_ORIGINS: http://localhost:5173
    volumes:
      - ./backend:/app
      - bundle_cache:/usr/local/bundle

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend-dev
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3000
    volumes:
      - ./frontend:/app
      - node_modules:/app/node_modules

  sidekiq:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend-dev
    command: bundle exec sidekiq
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/app_development
      REDIS_URL: redis://redis:6379/1
      RAILS_ENV: development
    volumes:
      - ./backend:/app
      - bundle_cache:/usr/local/bundle

volumes:
  postgres_data:
  redis_data:
  bundle_cache:
  node_modules: