# commissioning-report 8.2 (D-R9/D14) — TODO texto fixo do Protocolo de
# Comissionamento, resolvido no SERVIDOR e entregue já pronto no payload (o frontend
# não tem cópia dessas strings). Versionado `v1`: mudar o texto de um documento
# assinado é mudança MATERIAL — a chave nova conviveria com a antiga, não a
# sobrescreveria. Um sweep (8.2) falha o CI se faltar chave ou se aparecer literal
# pt-BR dentro de features/report/.
pt-BR:
  report:
    v1:
      title: 'PROTOCOLO DE COMISSIONAMENTO'
      # Carimbo
      stamp_label_done: 'CONCLUÍDO'
