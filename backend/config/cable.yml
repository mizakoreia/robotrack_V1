development:
  adapter: redis
  # delivery-and-observability 3.1: Redis do cable isolado; cai no REDIS_URL em dev.
  url: <%= ENV.fetch('REDIS_CABLE_URL') { ENV.fetch('REDIS_URL', 'redis://localhost:6379/2') } %>
  channel_prefix: robotrack_development

test:
  adapter: test

production:
  adapter: redis
  url: <%= ENV.fetch('REDIS_CABLE_URL') { ENV.fetch('REDIS_URL', 'redis://localhost:6379/1') } %>
  channel_prefix: robotrack_production
