# nginx do bundle React (delivery-and-observability 3.3). Contrato de cache do
# PWA — o que impede o usuário de ficar preso numa versão antiga do service
# worker (D7) e o que garante que assets com hash sejam cacheados agressivamente.
#
# Regras (invariantes de 3.3):
#   index.html + sw.js  → no-store         (o SW e o shell SEMPRE revalidam)
#   /assets/*-<hash>.*   → immutable, 1 ano (o hash muda a URL a cada build)
#   /api/**              → no-store         (nunca cachear resposta autenticada)

worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  gzip          on;
  gzip_types    text/css application/javascript application/json image/svg+xml;

  # Backend upstream (proxy de /api e /cable). O host `backend` vem do compose.
  upstream backend {
    server backend:3000;
  }

  server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── API e WebSocket: NUNCA cacheados, sempre ao backend ──────────────────
    location /api/ {
      proxy_pass http://backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      add_header Cache-Control "no-store" always;
    }

    location /cable {
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      add_header Cache-Control "no-store" always;
    }

    # ── Service worker e shell: SEMPRE revalidam (deploy assume a aba) ────────
    location = /sw.js {
      add_header Cache-Control "no-store, must-revalidate" always;
      try_files $uri =404;
    }

    location = /index.html {
      add_header Cache-Control "no-store, must-revalidate" always;
    }

    # ── Assets com hash no nome: imutáveis por 1 ano ─────────────────────────
    location /assets/ {
      add_header Cache-Control "public, max-age=31536000, immutable" always;
      try_files $uri =404;
    }

    # ── SPA: qualquer rota cai no index.html (roteamento no cliente) ──────────
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
