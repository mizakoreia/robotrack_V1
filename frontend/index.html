<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- workspace-invitations 6.3: o token do convite chega na URL
         (`/convite/<token>`). Sem isto, qualquer requisição a outra origem feita
         a partir dessa página levaria a URL inteira — com a credencial — no
         cabeçalho `Referer`. O par disto é o `history.replaceState` da
         InviteRoute, que tira o token da barra assim que ele é guardado. -->
    <meta name="referrer" content="no-referrer" />
    <!-- design-system 4.2 — cor da barra do navegador (escuro por padrão). -->
    <meta name="theme-color" content="#0a0f1d" />
    <!-- design-system 4.2 — script SÍNCRONO anti-FOUC: aplica `.light` ANTES da
         hidratação, para nenhum frame pintar o fundo escuro quando o tema salvo é
         claro. Lê localStorage['rt-theme'] (formato do zustand/persist). NÃO
         consulta o esquema do sistema (D-DS-3). -->
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('rt-theme')
          var theme = 'dark'
          if (raw) {
            var parsed = JSON.parse(raw)
            theme = (parsed && parsed.state && parsed.state.theme) || 'dark'
          }
          if (theme === 'light') document.documentElement.classList.add('light')
          document.documentElement.setAttribute('data-theme', theme)
        } catch (e) {}
      })()
    </script>
    <!-- design-system 3.1 — Inter 300–700 com font-display: swap. Se
         fonts.googleapis.com for bloqueado (CSP/offline), o texto segue visível
         na fallback stack, sem período invisível. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Robotrack</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
